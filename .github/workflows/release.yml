name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "AURAFLOW_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "AURAFLOW_BUILD=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app bundle and archives
        shell: bash
        run: ./build_app.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AuraFlow v${{ env.AURAFLOW_VERSION }}
          files: |
            dist/AuraFlow.dmg
            dist/AuraFlow.zip
