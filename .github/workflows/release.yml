name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-sign-notarize:
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      CLANG_MODULE_CACHE_PATH: /tmp/auraflow-clang-module-cache
      BUILD_UNIVERSAL: "1"
      REQUIRE_UNIVERSAL: "1"
      REQUIRE_CODESIGN: "1"
      PYTHON_BUILD_PYTHON: /usr/bin/python3
      APP_DISPLAY_NAME: AuraFlow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "AURAFLOW_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "AURAFLOW_BUILD=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"

      - name: Validate signing secrets
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          : "${APPLE_CERTIFICATE_P12_BASE64:?Missing APPLE_CERTIFICATE_P12_BASE64}"
          : "${APPLE_CERTIFICATE_PASSWORD:?Missing APPLE_CERTIFICATE_PASSWORD}"
          : "${APPLE_DEVELOPER_ID_APPLICATION:?Missing APPLE_DEVELOPER_ID_APPLICATION}"
          : "${APPLE_ID:?Missing APPLE_ID}"
          : "${APPLE_APP_SPECIFIC_PASSWORD:?Missing APPLE_APP_SPECIFIC_PASSWORD}"
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID}"

      - name: Import Developer ID certificate
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/auraflow-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -f pkcs12 \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          {
            echo "CODESIGN_IDENTITY=$APPLE_DEVELOPER_ID_APPLICATION"
            echo "CODESIGN_KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "${GITHUB_ENV}"

      - name: Ensure Rosetta is available for universal build
        shell: bash
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            sudo /usr/sbin/softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Build signed app bundle and archives
        shell: bash
        run: ./build_app.sh

      - name: Submit app ZIP for notarization
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/AuraFlow.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/AuraFlow.app

      - name: Repackage stapled artifacts
        shell: bash
        env:
          APP_DISPLAY_NAME: AuraFlow
        run: |
          rm -f "dist/${APP_DISPLAY_NAME}.zip" "dist/${APP_DISPLAY_NAME}.dmg"
          pushd dist >/dev/null
          ditto -c -k --keepParent "${APP_DISPLAY_NAME}.app" "${APP_DISPLAY_NAME}.zip"

          rm -rf .dmg-stage
          mkdir -p .dmg-stage
          cp -R "${APP_DISPLAY_NAME}.app" ".dmg-stage/${APP_DISPLAY_NAME}.app"
          ln -s /Applications .dmg-stage/Applications
          hdiutil create \
            -volname "${APP_DISPLAY_NAME}" \
            -srcfolder .dmg-stage \
            -ov \
            -format UDZO \
            "${APP_DISPLAY_NAME}.dmg" >/dev/null
          rm -rf .dmg-stage
          popd >/dev/null

      - name: Sign and notarize DMG
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign \
            --force \
            --sign "$CODESIGN_IDENTITY" \
            --timestamp \
            --keychain "$CODESIGN_KEYCHAIN_PATH" \
            dist/AuraFlow.dmg

          xcrun notarytool submit dist/AuraFlow.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/AuraFlow.dmg

      - name: Verify notarized artifacts
        shell: bash
        run: |
          codesign --verify --deep --strict --verbose=2 dist/AuraFlow.app
          spctl -a -vv dist/AuraFlow.app
          spctl -a -vv -t open dist/AuraFlow.dmg

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/AuraFlow.zip
            dist/AuraFlow.dmg
          if-no-files-found: error

  smoke-test:
    needs: build-sign-notarize
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-13
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Smoke test notarized ZIP and DMG
        shell: bash
        run: |
          mkdir -p smoke
          ditto -x -k dist/AuraFlow.zip smoke
          APP_PATH="$PWD/smoke/AuraFlow.app"
          PYTHON_HOME="$APP_PATH/Contents/Frameworks/Python3.framework/Versions/Current"
          PYTHON_PATH="$APP_PATH/Contents/Resources/Python:$APP_PATH/Contents/Resources/Python/site-packages"
          PYTHON_BIN="$PYTHON_HOME/bin/python3"

          uname -m
          lipo -archs "$APP_PATH/Contents/MacOS/WallpaperControlApp"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -vv "$APP_PATH"
          spctl -a -vv -t open dist/AuraFlow.dmg

          PYTHONHOME="$PYTHON_HOME" \
          PYTHONPATH="$PYTHON_PATH" \
          PYTHON_EXECUTABLE="$PYTHON_BIN" \
          PYTHONNOUSERSITE=1 \
          PYTHONDONTWRITEBYTECODE=1 \
          "$PYTHON_BIN" -c 'import objc, AppKit, sys; print(sys.executable); print(objc.__file__); print(AppKit.__file__)'

          PYTHONHOME="$PYTHON_HOME" \
          PYTHONPATH="$PYTHON_PATH" \
          PYTHON_EXECUTABLE="$PYTHON_BIN" \
          PYTHONNOUSERSITE=1 \
          PYTHONDONTWRITEBYTECODE=1 \
          "$PYTHON_BIN" "$APP_PATH/Contents/Resources/Python/control.py" status >/dev/null

  publish-release:
    needs:
      - build-sign-notarize
      - smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AuraFlow ${{ github.ref_name }}
          files: |
            dist/AuraFlow.dmg
            dist/AuraFlow.zip
